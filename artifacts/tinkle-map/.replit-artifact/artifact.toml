kind = "mobile"
previewPath = "/tinkle-map/"
title = "Tinkle Map"
version = "1.0.0"
id = "artifacts/tinkle-map"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/tinkle-map/" ]
localPort = 20957

[services.development]
run = "pnpm --filter @workspace/tinkle-map run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tinkle-map", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/tinkle-map", "run", "serve" ]

[services.env]
PORT = "20957"
BASE_PATH = "/tinkle-map/"
